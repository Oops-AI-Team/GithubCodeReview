name = "oops-code-review"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# KV namespace binding
[[kv_namespaces]]
binding = "TASKS_KV"
id = "eb9347b94e344e1bb92da287ef435a21"

# Non-sensitive variables
[vars]
GITHUB_APP_NAME = "Oops-CodeReview"
CALLBACK_BASE_URL = "https://oops-app.denox.cc"
ADP_SSE_URL = "https://wss.lke.cloud.tencent.com/adp/v2/chat"

# Sensitive variables — set via `wrangler secret put <NAME>`:
#   GITHUB_APP_ID        — GitHub App ID
#   GITHUB_PRIVATE_KEY   — RSA private key PEM (base64 encoded)
#   GITHUB_WEBHOOK_SECRET — Webhook signing secret
#   ADP_APP_KEY          — ADP 应用 AppKey

[observability]
enabled = false

[observability.logs]
enabled = true
invocation_logs = true
